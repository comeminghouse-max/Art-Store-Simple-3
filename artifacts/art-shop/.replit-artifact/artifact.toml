kind = "web"
previewPath = "/"
title = "Art Shop"
version = "1.0.0"
id = "artifacts/art-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20458

[services.development]
run = "pnpm --filter @workspace/art-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/art-shop", "run", "build" ]
publicDir = "artifacts/art-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20458"
BASE_PATH = "/"
